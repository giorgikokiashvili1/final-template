<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ქვეყნების მიმოხილვა</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <span class="nav__logo">🌍 ქვეყნების მიმოხილვა</span>
      <div class="nav__links">
        <a href="index.html">ძიება</a>
        <a href="saved.html">შენახული</a>
      </div>
      <div class="nav__actions">
        <span id="nav-user"></span>
        <button id="logout-btn" type="button">გასვლა</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="search-section">
      <form id="search-form">
        <input
          type="text"
          id="search-input"
          name="search"
          placeholder="მოძებნე ქვეყანა..."
          minlength="2"
          required
        />
        <select id="region-filter" name="region">
          <option value="">ყველა რეგიონი</option>
          <option value="Africa">აფრიკა</option>
          <option value="Americas">ამერიკა</option>
          <option value="Asia">აზია</option>
          <option value="Europe">ევროპა</option>
          <option value="Oceania">ოკეანია</option>
        </select>
        <label class="form__checkbox">
          <input type="checkbox" id="large-only" name="large-only">
          მხოლოდ 10მლნ+ მოსახლეობა
        </label>
        <button type="submit">ძიება</button>
      </form>
      <button id="sort-btn" type="button">დალაგება მოსახლეობით</button>
    </section>

    <p id="loading-msg" hidden>იტვირთება…</p>
    <p id="error-msg" hidden></p>

    <section class="results-section">
      <div id="results-grid" class="results-grid"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 ქვეყნების მიმოხილვა | მონაცემები: REST Countries API v5</p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
